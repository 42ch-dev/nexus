name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-schemas:
    name: Validate JSON Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate schemas
        run: pnpm run validate-schemas

  verify-codegen:
    name: Verify Codegen Output
    runs-on: ubuntu-latest
    needs: validate-schemas
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run codegen
        run: pnpm run codegen
      - name: Check generated code is up-to-date
        run: |
          # After running codegen, check if generated files match committed versions
          if ! git diff --exit-code packages/nexus-contracts/src/generated/ crates/nexus-contracts/src/generated/; then
            echo "❌ Generated code is outdated or not committed!"
            echo "Please run 'pnpm run codegen' locally and commit the changes."
            echo ""
            echo "Changed files:"
            git diff --name-only packages/nexus-contracts/src/generated/ crates/nexus-contracts/src/generated/
            exit 1
          fi
          echo "✅ Generated code is up-to-date"
      - name: Verify TypeScript generated
        run: test -d packages/nexus-contracts/src/generated && test -f packages/nexus-contracts/src/generated/index.ts
      - name: Verify Rust generated
        run: test -d crates/nexus-contracts/src/generated && test -f crates/nexus-contracts/src/generated/mod.rs
      - name: Archive generated types
        uses: actions/upload-artifact@v4
        with:
          name: generated-types
          path: |
            packages/nexus-contracts/src/generated/
            crates/nexus-contracts/src/generated/

  rust-checks:
    name: Rust fmt & clippy
    runs-on: ubuntu-latest
    needs: verify-codegen
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install nightly rustfmt (for workspace .rustfmt.toml `ignore` on codegen output)
        run: rustup toolchain install nightly --component rustfmt --no-self-update
      - uses: actions/download-artifact@v4
        with:
          name: generated-types
          path: .
      - name: Read workspace version for cargo cache key
        id: workspace-version
        run: |
          v=$(python3 -c "import tomllib; print(tomllib.load(open('Cargo.toml', 'rb'))['workspace']['package']['version'])")
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: nexus-rust-${{ steps.workspace-version.outputs.version }}
      - name: Check formatting
        run: cargo +nightly fmt --all -- --check
      - name: Run clippy
        run: cargo clippy --all -- -D warnings

  typescript-checks:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    needs: verify-codegen
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - uses: actions/download-artifact@v4
        with:
          name: generated-types
          path: .
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build contracts package
        run: pnpm --filter @42ch/nexus-contracts run build
      - name: Typecheck
        run: pnpm run typecheck

  rust-tests:
    name: Rust tests
    runs-on: ubuntu-latest
    needs: rust-checks
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/download-artifact@v4
        with:
          name: generated-types
          path: .
      - name: Read workspace version for cargo cache key
        id: workspace-version
        run: |
          v=$(python3 -c "import tomllib; print(tomllib.load(open('Cargo.toml', 'rb'))['workspace']['package']['version'])")
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: nexus-rust-${{ steps.workspace-version.outputs.version }}
      - name: Run ACP integration tests
        run: cargo test -p nexus42 --test acp_registry --test cli_agent
      - name: Run all tests
        run: cargo test --all
