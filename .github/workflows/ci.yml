name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-schemas:
    name: Validate JSON Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate schemas
        run: pnpm run validate-schemas

  verify-codegen:
    name: Verify Codegen Output
    runs-on: ubuntu-latest
    needs: validate-schemas
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run codegen
        run: pnpm run codegen
      - name: Check generated code is up-to-date
        run: |
          # After running codegen, check if generated files match committed versions
          if ! git diff --exit-code packages/nexus-contracts/src/generated/ crates/nexus-contracts/src/generated/; then
            echo "❌ Generated code is outdated or not committed!"
            echo "Please run 'pnpm run codegen' locally and commit the changes."
            echo ""
            echo "Changed files:"
            git diff --name-only packages/nexus-contracts/src/generated/ crates/nexus-contracts/src/generated/
            exit 1
          fi
          echo "✅ Generated code is up-to-date"
      - name: Verify TypeScript generated
        run: test -d packages/nexus-contracts/src/generated && test -f packages/nexus-contracts/src/generated/index.ts
      - name: Verify Rust generated
        run: test -d crates/nexus-contracts/src/generated && test -f crates/nexus-contracts/src/generated/mod.rs
      - name: Archive generated types
        uses: actions/upload-artifact@v4
        with:
          name: generated-types
          path: |
            packages/nexus-contracts/src/generated/
            crates/nexus-contracts/src/generated/

  rust-checks:
    name: Rust fmt & clippy
    runs-on: ubuntu-latest
    needs: verify-codegen
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install nightly rustfmt (for workspace .rustfmt.toml `ignore` on codegen output)
        run: rustup toolchain install nightly --component rustfmt --no-self-update
      - uses: actions/download-artifact@v4
        with:
          name: generated-types
          path: .
      - name: Read workspace version for cargo cache key
        id: workspace-version
        run: |
          v=$(python3 -c "import tomllib; print(tomllib.load(open('Cargo.toml', 'rb'))['workspace']['package']['version'])")
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: nexus-rust-${{ steps.workspace-version.outputs.version }}
      - name: Check formatting
        run: cargo +nightly fmt --all -- --check
      - name: Run clippy
        run: cargo clippy --all -- -D warnings

  typescript-checks:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    needs: verify-codegen
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - uses: actions/download-artifact@v4
        with:
          name: generated-types
          path: .
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build contracts package
        run: pnpm --filter @42ch/nexus-contracts run build
      - name: Typecheck
        run: pnpm run typecheck

  schema-consistency-check:
    name: Schema Consistency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check CLI/daemon dependency on nexus-local-db
        run: |
          echo "Checking CLI and daemon both depend on nexus-local-db..."
          if ! grep -q 'nexus-local-db' crates/nexus42/Cargo.toml; then
            echo "❌ CLI does not depend on nexus-local-db"
            exit 1
          fi
          if ! grep -q 'nexus-local-db' crates/nexus42d/Cargo.toml; then
            echo "❌ Daemon does not depend on nexus-local-db"
            exit 1
          fi
          echo "✅ Both CLI and daemon depend on nexus-local-db"
      - name: Check DB_SCHEMA_VERSION location (single ownership)
        run: |
          echo "Checking DB_SCHEMA_VERSION is defined only in nexus-local-db..."
          # DB_SCHEMA_VERSION should be in nexus-local-db
          if ! grep -q 'pub const DB_SCHEMA_VERSION: u32' crates/nexus-local-db/src/version.rs; then
            echo "❌ DB_SCHEMA_VERSION not found in nexus-local-db/src/version.rs"
            exit 1
          fi
          # DB_SCHEMA_VERSION should NOT be duplicated in CLI/daemon (excluding imports)
          CLI_HAS_CONST=$(grep -E 'pub const DB_SCHEMA_VERSION: u32 = \d+' crates/nexus42/src/db/mod.rs 2>/dev/null | wc -l | tr -d ' ')
          DAEMON_HAS_CONST=$(grep -E 'pub const DB_SCHEMA_VERSION: u32 = \d+' crates/nexus42d/src/db/schema.rs 2>/dev/null | wc -l | tr -d ' ')
          if [ "$CLI_HAS_CONST" != "0" ]; then
            echo "❌ CLI has duplicated DB_SCHEMA_VERSION constant (should import from nexus-local-db)"
            exit 1
          fi
          if [ "$DAEMON_HAS_CONST" != "0" ]; then
            echo "❌ Daemon has duplicated DB_SCHEMA_VERSION constant (should import from nexus-local-db)"
            exit 1
          fi
          echo "✅ DB_SCHEMA_VERSION is defined only in nexus-local-db"
      - name: Check SCHEMA_VERSION source from generated contracts
        run: |
          echo "Checking SCHEMA_VERSION comes from nexus-contracts generated constants..."
          # SCHEMA_VERSION should be re-exported from nexus-contracts in nexus-local-db
          if ! grep -q 'pub use nexus_contracts::generated::LATEST_SCHEMA_VERSION as SCHEMA_VERSION' crates/nexus-local-db/src/version.rs; then
            echo "❌ SCHEMA_VERSION is not sourced from nexus-contracts::generated::LATEST_SCHEMA_VERSION"
            exit 1
          fi
          # Verify nexus-contracts has the generated constant
          if ! grep -q 'pub const LATEST_SCHEMA_VERSION: u32' crates/nexus-contracts/src/generated/mod.rs; then
            echo "❌ LATEST_SCHEMA_VERSION not found in nexus-contracts generated code"
            exit 1
          fi
          echo "✅ SCHEMA_VERSION is sourced from nexus-contracts generated constants"
      - name: Check no duplicated shared table DDL
        run: |
          echo "Checking no duplicated DDL for shared tables (workspace_meta, creators, reference_sources)..."
          # Shared tables should be defined only in nexus-local-db, not in CLI/daemon
          for table in workspace_meta creators reference_sources; do
            CLI_DDL=$(grep -r "CREATE TABLE IF NOT EXISTS $table" crates/nexus42/src/db/ 2>/dev/null | grep -v test | wc -l | tr -d ' ')
            DAEMON_DDL=$(grep -r "CREATE TABLE IF NOT EXISTS $table" crates/nexus42d/src/db/ 2>/dev/null | grep -v test | wc -l | tr -d ' ')
            LOCALDB_DDL=$(grep -r "CREATE TABLE IF NOT EXISTS $table" crates/nexus-local-db/src/ 2>/dev/null | wc -l | tr -d ' ')
            if [ "$CLI_DDL" != "0" ]; then
              echo "❌ CLI has duplicated DDL for $table table (should use nexus-local-db)"
              exit 1
            fi
            if [ "$DAEMON_DDL" != "0" ]; then
              echo "❌ Daemon has duplicated DDL for $table table (should use nexus-local-db)"
              exit 1
            fi
            if [ "$LOCALDB_DDL" == "0" ]; then
              echo "❌ $table table DDL not found in nexus-local-db"
              exit 1
            fi
          done
          echo "✅ No duplicated DDL - shared tables defined only in nexus-local-db"
      - name: Check no deprecated WIRE_SCHEMA_VERSION
        run: |
          echo "Checking no deprecated WIRE_SCHEMA_VERSION key..."
          # WIRE_SCHEMA_VERSION should NOT exist anywhere (replaced by schema_version)
          WIRE_IN_CLI=$(grep -r "WIRE_SCHEMA_VERSION" crates/nexus42/src/ 2>/dev/null | wc -l | tr -d ' ')
          WIRE_IN_DAEMON=$(grep -r "WIRE_SCHEMA_VERSION" crates/nexus42d/src/ 2>/dev/null | wc -l | tr -d ' ')
          WIRE_IN_LOCALDB=$(grep -r "WIRE_SCHEMA_VERSION" crates/nexus-local-db/src/ 2>/dev/null | wc -l | tr -d ' ')
          if [ "$WIRE_IN_CLI" != "0" ]; then
            echo "❌ Deprecated WIRE_SCHEMA_VERSION found in CLI (should use schema_version)"
            exit 1
          fi
          if [ "$WIRE_IN_DAEMON" != "0" ]; then
            echo "❌ Deprecated WIRE_SCHEMA_VERSION found in daemon (should use schema_version)"
            exit 1
          fi
          if [ "$WIRE_IN_LOCALDB" != "0" ]; then
            echo "❌ Deprecated WIRE_SCHEMA_VERSION found in nexus-local-db (should use schema_version)"
            exit 1
          fi
          echo "✅ No deprecated WIRE_SCHEMA_VERSION - using schema_version instead"
      - name: Check CLI/daemon use nexus-local-db API
        run: |
          echo "Checking CLI/daemon import from nexus-local-db..."
          # CLI should import init and RuntimeRole
          if ! grep -q 'use nexus_local_db::{init, RuntimeRole}' crates/nexus42/src/db/mod.rs; then
            echo "❌ CLI does not import nexus_local_db::{init, RuntimeRole}"
            exit 1
          fi
          # Daemon should import init and RuntimeRole
          if ! grep -q 'use nexus_local_db::{init, RuntimeRole}' crates/nexus42d/src/db/schema.rs; then
            echo "❌ Daemon does not import nexus_local_db::{init, RuntimeRole}"
            exit 1
          fi
          echo "✅ Both CLI and daemon use nexus-local-db API"

  rust-tests:
    name: Rust tests
    runs-on: ubuntu-latest
    needs: rust-checks
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/download-artifact@v4
        with:
          name: generated-types
          path: .
      - name: Read workspace version for cargo cache key
        id: workspace-version
        run: |
          v=$(python3 -c "import tomllib; print(tomllib.load(open('Cargo.toml', 'rb'))['workspace']['package']['version'])")
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: nexus-rust-${{ steps.workspace-version.outputs.version }}
      - name: Run ACP integration tests
        run: cargo test -p nexus42 --test acp_registry --test cli_agent
      - name: Run all tests
        run: cargo test --all
