name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-schemas:
    name: Validate JSON Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate schemas
        run: pnpm run validate-schemas

  verify-codegen:
    name: Verify Codegen Output
    runs-on: ubuntu-latest
    needs: validate-schemas
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run codegen
        run: pnpm run codegen
      - name: Check generated code is up-to-date
        run: |
          # After running codegen, check if generated files match committed versions
          if ! git diff --exit-code packages/nexus-contracts/src/generated/ crates/nexus-contracts/src/generated/; then
            echo "❌ Generated code is outdated or not committed!"
            echo "Please run 'pnpm run codegen' locally and commit the changes."
            echo ""
            echo "Changed files:"
            git diff --name-only packages/nexus-contracts/src/generated/ crates/nexus-contracts/src/generated/
            exit 1
          fi
          echo "✅ Generated code is up-to-date"
      - name: Verify TypeScript generated
        run: test -d packages/nexus-contracts/src/generated && test -f packages/nexus-contracts/src/generated/index.ts
      - name: Verify Rust generated
        run: test -d crates/nexus-contracts/src/generated && test -f crates/nexus-contracts/src/generated/mod.rs
      - name: Archive generated types
        uses: actions/upload-artifact@v4
        with:
          name: generated-types
          path: |
            packages/nexus-contracts/src/generated/
            crates/nexus-contracts/src/generated/

  rust-checks:
    name: Rust fmt & clippy
    runs-on: ubuntu-latest
    needs: verify-codegen
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install nightly rustfmt (for workspace .rustfmt.toml `ignore` on codegen output)
        run: rustup toolchain install nightly --component rustfmt --no-self-update
      - uses: actions/download-artifact@v4
        with:
          name: generated-types
          path: .
      - name: Read workspace version for cargo cache key
        id: workspace-version
        run: |
          v=$(python3 -c "import tomllib; print(tomllib.load(open('Cargo.toml', 'rb'))['workspace']['package']['version'])")
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: nexus-rust-${{ steps.workspace-version.outputs.version }}
      - name: Check formatting
        run: cargo +nightly fmt --all -- --check
      - name: Run clippy
        run: cargo clippy --all -- -D warnings

  typescript-checks:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    needs: verify-codegen
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - uses: actions/download-artifact@v4
        with:
          name: generated-types
          path: .
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build contracts package
        run: pnpm --filter @42ch/nexus-contracts run build
      - name: Typecheck
        run: pnpm run typecheck

  schema-drift-check:
    name: Schema Drift Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check DB schema version consistency (CLI vs daemon)
        run: |
          echo "Checking DB_SCHEMA_VERSION consistency across CLI and daemon..."
          CLI_VERSION=$(grep -oP 'pub const DB_SCHEMA_VERSION: u32 = \K\d+' crates/nexus42/src/db/mod.rs)
          DAEMON_VERSION=$(grep -oP 'pub const DB_SCHEMA_VERSION: u32 = \K\d+' crates/nexus42d/src/db/schema.rs)
          echo "CLI DB_SCHEMA_VERSION:    $CLI_VERSION"
          echo "Daemon DB_SCHEMA_VERSION: $DAEMON_VERSION"
          if [ "$CLI_VERSION" != "$DAEMON_VERSION" ]; then
            echo "❌ DB_SCHEMA_VERSION mismatch: CLI=$CLI_VERSION, Daemon=$DAEMON_VERSION"
            exit 1
          fi
          echo "✅ DB_SCHEMA_VERSION values match"
      - name: Check reference_sources table schema consistency
        run: |
          echo "Checking reference_sources table definitions across CLI and daemon..."
          # Extract column names from each definition (strip SQL comments and whitespace)
          CLI_COLS=$(sed -n '/CREATE TABLE IF NOT EXISTS reference_sources/,/);/p' crates/nexus42/src/db/mod.rs \
            | grep -v '^//' \
            | grep -oP '^\s+\K\w+' \
            | sort \
            | tr '\n' ' ')
          DAEMON_COLS=$(sed -n '/CREATE TABLE IF NOT EXISTS reference_sources/,/);/p' crates/nexus42d/src/db/schema.rs \
            | grep -v '^//' \
            | grep -oP '^\s+\K\w+' \
            | sort \
            | tr '\n' ' ')
          echo "CLI reference_sources columns:    $CLI_COLS"
          echo "Daemon reference_sources columns: $DAEMON_COLS"
          # Check that the core columns (not daemon-only additions like content) are present in both
          # CLI has content via ALTER TABLE migration, daemon does NOT have content column
          # So we check that key columns overlap
          for col in reference_source_id workspace_id source_type uri title content_hash scan_status created_at updated_at; do
            if ! echo "$CLI_COLS" | grep -qw "$col"; then
              echo "❌ CLI reference_sources missing expected column: $col"
              exit 1
            fi
            if ! echo "$DAEMON_COLS" | grep -qw "$col"; then
              echo "❌ Daemon reference_sources missing expected column: $col"
              exit 1
            fi
          done
          echo "✅ reference_sources key columns match (both have: reference_source_id, workspace_id, source_type, uri, title, content_hash, scan_status, created_at, updated_at)"
      - name: Check wire schema source from generated contracts
        run: |
          echo "Checking wire schema source from generated contracts..."
          CONTRACTS_VERSION=$(grep -oP 'pub const LATEST_SCHEMA_VERSION: u32 = \K\d+' crates/nexus-contracts/src/generated/mod.rs)
          echo "Generated LATEST_SCHEMA_VERSION: $CONTRACTS_VERSION"
          if ! grep -q 'pub const WIRE_SCHEMA_VERSION: u32 = LATEST_SCHEMA_VERSION;' crates/nexus42/src/db/mod.rs; then
            echo "❌ CLI WIRE_SCHEMA_VERSION is not sourced from LATEST_SCHEMA_VERSION"
            exit 1
          fi
          if ! grep -q 'pub const WIRE_SCHEMA_VERSION: u32 = LATEST_SCHEMA_VERSION;' crates/nexus42d/src/db/schema.rs; then
            echo "❌ Daemon WIRE_SCHEMA_VERSION is not sourced from LATEST_SCHEMA_VERSION"
            exit 1
          fi
          CLI_WIRE=$(grep -oP 'pub const WIRE_SCHEMA_VERSION: u32 = LATEST_SCHEMA_VERSION;' crates/nexus42/src/db/mod.rs | wc -l | tr -d ' ')
          DAEMON_WIRE=$(grep -oP 'pub const WIRE_SCHEMA_VERSION: u32 = LATEST_SCHEMA_VERSION;' crates/nexus42d/src/db/schema.rs | wc -l | tr -d ' ')
          if [ "$CLI_WIRE" != "1" ] || [ "$DAEMON_WIRE" != "1" ]; then
            echo "❌ Unexpected wire schema source declarations"
            exit 1
          fi
          echo "✅ Wire schema version is sourced from generated contracts"

  rust-tests:
    name: Rust tests
    runs-on: ubuntu-latest
    needs: rust-checks
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/download-artifact@v4
        with:
          name: generated-types
          path: .
      - name: Read workspace version for cargo cache key
        id: workspace-version
        run: |
          v=$(python3 -c "import tomllib; print(tomllib.load(open('Cargo.toml', 'rb'))['workspace']['package']['version'])")
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: nexus-rust-${{ steps.workspace-version.outputs.version }}
      - name: Run ACP integration tests
        run: cargo test -p nexus42 --test acp_registry --test cli_agent
      - name: Run all tests
        run: cargo test --all
