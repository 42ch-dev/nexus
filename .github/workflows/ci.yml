name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/README.md'
      - '**/AGENTS.md'
      - '**/CLAUDE.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/README.md'
      - '**/AGENTS.md'
      - '**/CLAUDE.md'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  validate-schemas:
    name: Validate JSON Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@eae0cfeb286e66ffb5155f1a79b90583a127a68b  # v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate schemas
        run: pnpm run validate-schemas

  verify-codegen:
    name: Verify Codegen Output
    runs-on: ubuntu-latest
    needs: validate-schemas
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@eae0cfeb286e66ffb5155f1a79b90583a127a68b  # v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run codegen
        run: pnpm run codegen
      - name: Check generated code is up-to-date
        run: |
          # After running codegen, check if generated files match committed versions
          if ! git diff --exit-code packages/nexus-contracts/src/generated/ crates/nexus-contracts/src/generated/; then
            echo "❌ Generated code is outdated or not committed!"
            echo "Please run 'pnpm run codegen' locally and commit the changes."
            echo ""
            echo "Changed files:"
            git diff --name-only packages/nexus-contracts/src/generated/ crates/nexus-contracts/src/generated/
            exit 1
          fi
          echo "✅ Generated code is up-to-date"
      - name: Verify TypeScript generated
        run: test -d packages/nexus-contracts/src/generated && test -f packages/nexus-contracts/src/generated/index.ts
      - name: Verify Rust generated
        run: test -d crates/nexus-contracts/src/generated && test -f crates/nexus-contracts/src/generated/mod.rs
      - name: Archive generated types
        uses: actions/upload-artifact@v4
        with:
          name: generated-types
          path: |
            packages/nexus-contracts/src/generated/
            crates/nexus-contracts/src/generated/

  rust-checks:
    name: Rust fmt & clippy
    runs-on: ubuntu-latest
    needs: verify-codegen
    env:
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: rustfmt, clippy
          # nexus-wasm-host's build.rs compiles embedded modules from source
          # (see crates/nexus-wasm-host/build.rs).
          targets: wasm32-unknown-unknown
      - name: Install nightly rustfmt (for workspace .rustfmt.toml `ignore` on codegen output)
        run: rustup toolchain install nightly --component rustfmt --no-self-update
      - uses: actions/download-artifact@v4
        with:
          name: generated-types
          path: .
      - name: Read workspace version for cargo cache key
        id: workspace-version
        run: |
          v=$(python3 -c "import tomllib; print(tomllib.load(open('Cargo.toml', 'rb'))['workspace']['package']['version'])")
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae  # v2
        with:
          shared-key: nexus-rust-${{ steps.workspace-version.outputs.version }}
      - name: Check formatting
        run: cargo +nightly fmt --all -- --check
      - name: Run clippy
        run: cargo clippy --all -- -D warnings

  verify-sqlx-offline:
    name: Verify sqlx offline metadata
    runs-on: ubuntu-latest
    needs: verify-codegen
    env:
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/download-artifact@v4
        with:
          name: generated-types
          path: .
      - name: Verify sqlx offline metadata is up-to-date
        run: |
          # SQLX_OFFLINE=true makes cargo check use committed .sqlx/ metadata
          # If any query macro's metadata is missing or stale, this will fail
          cargo check --all --all-targets

  typescript-checks:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    needs: verify-codegen
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@eae0cfeb286e66ffb5155f1a79b90583a127a68b  # v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - uses: actions/download-artifact@v4
        with:
          name: generated-types
          path: .
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build contracts package
        run: pnpm --filter @42ch/nexus-contracts run build
      - name: Typecheck
        run: pnpm run typecheck

  web-build:
    name: Web app build & typecheck
    runs-on: ubuntu-latest
    needs: verify-codegen
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@eae0cfeb286e66ffb5155f1a79b90583a127a68b  # v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - uses: actions/download-artifact@v4
        with:
          name: generated-types
          path: .
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build contracts package
        run: pnpm --filter @42ch/nexus-contracts run build
      - name: Typecheck web
        run: pnpm --filter web typecheck
      - name: Build web
        run: pnpm --filter web build

  verify-no-acp-in-daemon:
    name: Verify nexus-daemon-runtime linkage matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert nexus-daemon-runtime does not link ACP host / SDK
        run: |
          set -e
          if rg -n '^\s*(nexus-acp-host|agent-client-protocol)\s*=' crates/nexus-daemon-runtime/Cargo.toml; then
            echo "::error::nexus-daemon-runtime/Cargo.toml must not depend on nexus-acp-host or agent-client-protocol — see .mstar/archived/knowledge/acp-client-tech-spec.md §11.3"
            exit 1
          fi
          echo "Linkage gate OK"

  schema-consistency-check:
    name: Schema Consistency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run schema consistency checks
        run: bash tooling/check-schema-drift.sh

  rust-tests:
    name: Rust tests (${{ matrix.group }})
    runs-on: ubuntu-latest
    needs: verify-codegen
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: core
            packages: >-
              -p nexus-contracts
              -p nexus-home-layout
              -p nexus-local-db
              -p nexus-cloud-domain
          - group: orchestration-domain
            packages: >-
              -p nexus-orchestration
              -p nexus-creator
              -p nexus-creator-memory
              -p nexus-kb
              -p nexus-knowledge
              -p nexus-narrative
              -p nexus-moment-context-assembly
              -p nexus-cloud-sync
              -p nexus-wasm-host
          - group: daemon
            packages: >-
              -p nexus-daemon-runtime
          - group: cli-hosts
            packages: >-
              -p nexus42
              -p nexus-acp-host
              -p nexus-agent-host
    env:
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/download-artifact@v4
        with:
          name: generated-types
          path: .
      - name: Read workspace version for cargo cache key
        id: workspace-version
        run: |
          v=$(python3 -c "import tomllib; print(tomllib.load(open('Cargo.toml', 'rb'))['workspace']['package']['version'])")
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae  # v2
        with:
          shared-key: nexus-rust-${{ steps.workspace-version.outputs.version }}-${{ matrix.group }}
      - name: Run tests
        run: cargo test ${{ matrix.packages }}
