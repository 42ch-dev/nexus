name: Desktop Release

on:
  release:
    types: [published]

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

env:
  SQLX_OFFLINE: "true"
  APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
  APPLE_SIGN_CERT_P12_BASE64: ${{ secrets.APPLE_SIGN_CERT_P12_BASE64 }}
  APPLE_ID: ${{ secrets.APPLE_ID }}
  APPLE_PWD: ${{ secrets.APPLE_PWD }}
  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

jobs:
  desktop-release:
    name: Build and release macOS desktop app
    runs-on: macos-14
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Evaluate signing secrets
        id: sign-eval
        run: |
          set -euo pipefail
          required=("$APPLE_SIGN_IDENTITY" "$APPLE_SIGN_CERT_P12_BASE64" "$APPLE_ID" "$APPLE_PWD" "$APPLE_TEAM_ID")
          names=(APPLE_SIGN_IDENTITY APPLE_SIGN_CERT_P12_BASE64 APPLE_ID APPLE_PWD APPLE_TEAM_ID)
          missing=()
          present=0
          for i in "${!required[@]}"; do
            if [ -n "${required[$i]}" ]; then
              present=$((present + 1))
            else
              missing+=("${names[$i]}")
            fi
          done

          if [ "$present" -eq 0 ]; then
            echo "should_sign=false" >> "$GITHUB_OUTPUT"
            echo "partial=false" >> "$GITHUB_OUTPUT"
            echo "::notice::unsigned build (no signing secrets)"
          elif [ "$present" -eq "${#required[@]}" ]; then
            echo "should_sign=true" >> "$GITHUB_OUTPUT"
            echo "partial=false" >> "$GITHUB_OUTPUT"
            echo "Signing with all ${#required[@]} secrets."
          else
            echo "should_sign=false" >> "$GITHUB_OUTPUT"
            echo "partial=true" >> "$GITHUB_OUTPUT"
            echo "::error::Partial signing secrets present. Missing: ${missing[*]}. Unsigned artifact will be uploaded, then the job will fail."
          fi

      - uses: ./.github/actions/setup-monorepo
        with:
          rust-targets: aarch64-apple-darwin, x86_64-apple-darwin, wasm32-unknown-unknown

      # V1.73 B7 (R-V172P1-QC3-003): cache the Rust build legs (workspace +
      # Tauri crate) so release rebuilds reuse compilation artifacts. Mirrors
      # the cache wiring already used by ci.yml / desktop-build.yml. The pinned
      # SHA and the `workspaces` list match desktop-build.yml exactly so the two
      # jobs share cache entries where their targets overlap.
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          key: desktop-release-universal
          workspaces: |
            .
            apps/desktop/src-tauri

      - name: Build contracts package
        run: pnpm --filter @42ch/nexus-contracts run build

      - name: Build Tauri desktop bundle (universal)
        run: |
          set -euo pipefail
          SIDECAR_TARGETS="aarch64-apple-darwin x86_64-apple-darwin" \
            pnpm --filter desktop tauri build --target universal-apple-darwin

      - name: Locate bundle outputs
        id: bundle
        run: |
          set -euo pipefail
          base="apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle"
          app_path="$base/macos/Nexus.app"
          dmg_path=$(find "$base/dmg" -maxdepth 1 -name '*.dmg' -print -quit)
          if [ ! -d "$app_path" ]; then
            echo "::error::Expected app bundle not found at $app_path"
            exit 1
          fi
          if [ -z "$dmg_path" ] || [ ! -f "$dmg_path" ]; then
            echo "::error::Expected DMG not found in $base/dmg"
            exit 1
          fi
          echo "app_path=$app_path" >> "$GITHUB_OUTPUT"
          echo "dmg_path=$dmg_path" >> "$GITHUB_OUTPUT"
          echo "bundle_dir=$base" >> "$GITHUB_OUTPUT"

      - name: Preserve unsigned DMG fallback
        if: ${{ steps.bundle.outcome == 'success' }}
        run: |
          set -euo pipefail
          cp "${{ steps.bundle.outputs.dmg_path }}" "${{ steps.bundle.outputs.bundle_dir }}/Nexus-unsigned-fallback.dmg"

      - name: Create temporary signing keychain
        if: ${{ steps.sign-eval.outputs.should_sign == 'true' }}
        id: keychain
        timeout-minutes: 20
        run: |
          set -euo pipefail
          keychain_path="$RUNNER_TEMP/nexus-signing.keychain-db"
          keychain_pass=$(openssl rand -base64 32)
          p12_path="$RUNNER_TEMP/nexus-cert.p12"

          # Capture the original user keychain list so we can restore it later.
          original=$(security list-keychains -d user | tr '\n' ' ' | sed 's/ *$//')

          security create-keychain -p "$keychain_pass" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_pass" "$keychain_path"

          echo "$APPLE_SIGN_CERT_P12_BASE64" | base64 --decode > "$p12_path"
          security import "$p12_path" -P "" -k "$keychain_path" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_pass" "$keychain_path"
          security list-keychains -d user -s "$keychain_path" $original

          echo "keychain_path=$keychain_path" >> "$GITHUB_OUTPUT"
          echo "p12_path=$p12_path" >> "$GITHUB_OUTPUT"
          echo "original_keychains=$original" >> "$GITHUB_OUTPUT"

      - name: Sign app bundle with hardened runtime
        if: ${{ steps.sign-eval.outputs.should_sign == 'true' }}
        timeout-minutes: 20
        run: |
          set -euo pipefail
          /usr/bin/codesign --force --sign "$APPLE_SIGN_IDENTITY" \
            --options runtime --timestamp --deep \
            "${{ steps.bundle.outputs.app_path }}"
          /usr/bin/codesign --verify --deep --strict "${{ steps.bundle.outputs.app_path }}"

      - name: Recreate signed DMG
        if: ${{ steps.sign-eval.outputs.should_sign == 'true' }}
        timeout-minutes: 20
        run: |
          set -euo pipefail
          dmg_path="${{ steps.bundle.outputs.dmg_path }}"
          app_path="${{ steps.bundle.outputs.app_path }}"
          dmg_base="${dmg_path%.dmg}"
          # Remove the unsigned DMG and rebuild from the signed app.
          rm -f "$dmg_path"
          hdiutil create -volname "Nexus" -srcfolder "$app_path" -ov -format UDZO "$dmg_base"
          if [ ! -f "$dmg_path" ]; then
            echo "::error::Signed DMG was not recreated at $dmg_path"
            exit 1
          fi

      - name: Notarize DMG
        if: ${{ steps.sign-eval.outputs.should_sign == 'true' }}
        timeout-minutes: 20
        run: |
          set -euo pipefail
          xcrun notarytool submit "${{ steps.bundle.outputs.dmg_path }}" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PWD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Staple DMG
        if: ${{ steps.sign-eval.outputs.should_sign == 'true' }}
        id: staple
        timeout-minutes: 20
        run: |
          set -euo pipefail
          xcrun stapler staple "${{ steps.bundle.outputs.dmg_path }}"

      - name: Package release assets
        if: ${{ always() && steps.bundle.outcome == 'success' }}
        run: |
          set -euo pipefail
          if [ ! -d "${{ steps.bundle.outputs.app_path }}" ]; then
            echo "::error::Expected app bundle not found at ${{ steps.bundle.outputs.app_path }}"
            exit 1
          fi
          cd "${{ steps.bundle.outputs.bundle_dir }}"
          zip -r "Nexus-macos-universal.app.zip" "macos/Nexus.app"

      - name: Upload release assets
        if: ${{ always() && steps.bundle.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cd "${{ steps.bundle.outputs.bundle_dir }}"

          should_sign="${{ steps.sign-eval.outputs.should_sign }}"
          signed_dmg="${{ steps.bundle.outputs.dmg_path }}"
          fallback_dmg="Nexus-unsigned-fallback.dmg"
          app_zip="Nexus-macos-universal.app.zip"

          if [ ! -f "$app_zip" ]; then
            echo "::error::Expected app.zip not found in $PWD"
            exit 1
          fi

          files=("$app_zip")
          if [ "$should_sign" = "true" ]; then
            if [ "${{ steps.staple.outcome }}" = "success" ]; then
              echo "::notice::Uploading signed DMG."
              files+=("$signed_dmg")
            else
              echo "::error::Signing/notarization/staple failed; uploading unsigned fallback DMG instead of signed artifact."
              files+=("$fallback_dmg")
            fi
          else
            echo "::notice::Uploading unsigned DMG (no signing secrets)."
            files+=("$signed_dmg")
          fi

          gh release upload --clobber "${{ github.event.release.tag_name }}" "${files[@]}"

      - name: Clean up signing keychain
        if: ${{ always() && steps.sign-eval.outputs.should_sign == 'true' }}
        run: |
          set -euo pipefail
          keychain_path="${{ steps.keychain.outputs.keychain_path }}"
          p12_path="${{ steps.keychain.outputs.p12_path }}"
          original="${{ steps.keychain.outputs.original_keychains }}"
          if [ -n "$original" ]; then
            security list-keychains -d user -s $original || true
          fi
          if [ -n "$keychain_path" ] && security list-keychains | grep -q "$keychain_path"; then
            security delete-keychain "$keychain_path" || true
          fi
          rm -f "$p12_path"

      - name: Fail on partial signing secrets
        if: ${{ steps.sign-eval.outputs.partial == 'true' }}
        run: |
          echo "::error::Partial signing secrets were provided. Provide all five secrets (APPLE_SIGN_IDENTITY, APPLE_SIGN_CERT_P12_BASE64, APPLE_ID, APPLE_PWD, APPLE_TEAM_ID) for a signed release, or none for an unsigned release."
          exit 1
