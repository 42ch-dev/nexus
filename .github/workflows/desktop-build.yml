name: Desktop Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'apps/desktop/**'
      - 'apps/nexus42/**'
      - 'packages/nexus-contracts/**'
      - 'crates/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'apps/desktop/**'
      - 'packages/nexus-contracts/**'
      - '.github/workflows/**'

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

env:
  SQLX_OFFLINE: "true"
  # Sign when the secret is present; otherwise build unsigned (local dev / PRs).
  APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

jobs:
  desktop-build:
    name: Build macOS desktop app
    runs-on: macos-14
    # F1: single-arch native aarch64 build fits the 6h Actions budget; fail fast
    # if something hangs. macos-13 (Intel) is deprecated and no longer provisions,
    # which caused the previous x86_64 job to hang at "Waiting for a runner...".
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: pnpm/action-setup@eae0cfeb286e66ffb5155f1a79b90583a127a68b  # v2
        with:
          version: 9

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 22
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          # F1: native aarch64 on macos-14 (Apple Silicon runner). Intel-Mac
          # support is a V1.67+ multi-arch concern; V1.66 ships an unsigned
          # aarch64-native dev build for the developer/contributor audience.
          # wasm32-unknown-unknown is required because nexus42 embeds the
          # `basic-combat` WASM module via nexus-wasm-host's build script.
          # x86_64-apple-darwin is installed so the universal fallback path can
          # build both architecture sidecars if needed (QC1-S4).
          targets: aarch64-apple-darwin, x86_64-apple-darwin, wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          key: desktop-macos-aarch64
          workspaces: |
            .
            apps/desktop/src-tauri

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Build contracts package
        run: pnpm --filter @42ch/nexus-contracts run build

      - name: Report signing mode
        run: |
          if [ -n "$APPLE_SIGNING_IDENTITY" ]; then
            echo "Signing identity configured; bundle will be signed."
          else
            echo "No signing identity configured; bundle will be unsigned."
          fi

      - name: Build Tauri desktop bundle (universal, fallback per-arch)
        run: |
          set -euo pipefail
          # QC1-S4: attempt a universal build first; if Tauri's bundler or the
          # cross-arch sidecar build fails, fall back to the proven native
          # aarch64 path so CI stays green.
          if SIDECAR_TARGETS="aarch64-apple-darwin x86_64-apple-darwin" \
             pnpm --filter desktop tauri build --target universal-apple-darwin; then
            echo "Built universal-apple-darwin bundle."
          else
            echo "Universal build failed; falling back to per-arch (aarch64 host) bundle."
            pnpm --filter desktop tauri build
          fi

      # Note: build artifacts are intentionally NOT uploaded here. This workflow
      # is a build-verification gate (does the Tauri bundle assemble on macOS?),
      # not an artifact-production pipeline. Distributable .app/.dmg assets are
      # produced by .github/workflows/desktop-release.yml on `release.published`
      # (which builds independently and uploads via `gh release upload`).
