name: Desktop Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'apps/desktop/**'
      - 'apps/nexus42/**'
      - 'packages/nexus-contracts/**'
      - 'crates/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'apps/desktop/**'
      - 'packages/nexus-contracts/**'
      - '.github/workflows/**'

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

env:
  SQLX_OFFLINE: "true"

jobs:
  desktop-build:
    name: Build unsigned macOS desktop app
    runs-on: macos-14
    # F1: single-arch native aarch64 build fits the 6h Actions budget; fail fast
    # if something hangs. macos-13 (Intel) is deprecated and no longer provisions,
    # which caused the previous x86_64 job to hang at "Waiting for a runner...".
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: ./.github/actions/setup-monorepo
        with:
          # Native aarch64 only — the universal build (aarch64 + x86_64
          # sidecar cross-compile) roughly doubled Rust compile time and pushed
          # this job past the ~5min CI budget. This is a build-verification
          # gate; the distributable universal binary is produced by
          # desktop-release.yml. wasm32 is retained for the wasm-host feature.
          rust-targets: aarch64-apple-darwin, wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          key: desktop-macos-aarch64
          workspaces: |
            .
            apps/desktop/src-tauri

      - name: Build contracts package
        run: pnpm --filter @42ch/nexus-contracts run build

      - name: Build Tauri desktop bundle (native aarch64)
        # Native host build only (macos-14 = aarch64). The previous
        # universal-apple-darwin attempt compiled the nexus42 sidecar for both
        # arches (~2x Rust compile) and pushed CI past budget; it is now reserved
        # for the release workflow. Native aarch64 still verifies the Tauri
        # bundle assembles end-to-end on macOS.
        run: pnpm --filter desktop tauri build

      # Note: build artifacts are intentionally NOT uploaded here. This workflow
      # is a build-verification gate (does the Tauri bundle assemble on macOS?),
      # not an artifact-production pipeline. Distributable .app/.dmg assets are
      # produced by .github/workflows/desktop-release.yml on `release.published`
      # (which builds independently and uploads via `gh release upload`).

  served-ui-smoke:
    name: Served UI smoke test
    runs-on: macos-14
    # No `needs: desktop-build` — this job builds its own daemon + SPA and does
    # not consume the Tauri bundle artifact, so it runs in parallel with
    # desktop-build to keep the workflow wall-clock at max(desktop, smoke)
    # instead of desktop + smoke.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: ./.github/actions/setup-monorepo
        with:
          rust-targets: aarch64-apple-darwin, wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          key: served-ui-smoke-macos-aarch64
          workspaces: |
            .

      - name: Build contracts package
        run: pnpm --filter @42ch/nexus-contracts run build

      - name: Run served-UI smoke test
        # The script's own SKIP_WEB_BUILD guard is left at its default; this
        # job is a separate runner from `desktop-build` so its built SPA is
        # not accessible here. Letting the script build the SPA locally keeps
        # the smoke test self-contained.
        run: ./scripts/served-ui-smoke.sh
