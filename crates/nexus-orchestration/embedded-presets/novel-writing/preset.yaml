# Input variables (passed via core_context when starting a schedule):
#   work_id:        Work entity ID (wrk_...).
#   work_ref:       Human-readable short reference used as directory name (e.g., "my-first-novel").
#   topic:          Novel topic or description (e.g., "A sci-fi thriller about AI consciousness").
#   vibe:           Writing style (default: "literary").
#   chapter:        Chapter number to work on (auto-selected by next_chapter() or default 1).
#   chapter_label:  Zero-padded chapter label (e.g., "01", "02", "10").
#   outline_path:   Full relative path to chapter outline file.
#   body_path:      Full relative path to chapter body file.
#   slug:           Chapter filename slug (e.g., "ch01" or descriptive kebab-case).
#
#   Launch: nexus42 creator run stage advance --stage produce
#   Requires: novel-project-init completed (gated by §5.3.2).

preset:
  id: novel-writing
  version: 8  # V1.48 P1: open_findings_block template var for chapter-scoped findings injection
  kind: creator
  description: "Per-chapter outline → draft → finalize pipeline; gated by llm_judge 五問 quality check"
  requires_capabilities:
    - creator.inject_prompt
    - acp.prompt
    - judge.llm
    - novel.chapter_transition
  run_intents:
    - work_continue
  initial: outline_chapter
  terminal: done
  world_binding:
    mode: optional  # V1.36 ships optional; worldless Works not blocked per §5.3.4
  # Preset gates (per spec §5.3.2) — enforced at enqueue time.
  gates:
    - kind: work_field
      field: work_profile
      op: equals
      value: novel
    - kind: work_field
      field: work_ref
      op: required
    - kind: work_field
      field: intake_status
      op: equals
      value: complete
    - kind: filesystem
      path: "Works/{{work_ref}}/"
      must_exist: true
    - kind: filesystem
      path: "Works/{{work_ref}}/Outlines/"
      must_exist: true
    - kind: filesystem
      path: "Works/{{work_ref}}/Stories/"
      must_exist: true
    # world_id gate intentionally omitted — V1.37 world_binding.mode = optional
    # (spec §5.3.4: worldless Works not blocked). Add when mode defaults to required.
    - kind: previous_preset
      preset: novel-project-init
      status: complete
      scope: work

# Multi-agent role definitions (WS-E §7)
roles:
  - id: writer
    description: "Primary content writer for drafting narrative text"
    system_prompt_file: prompts/writer-system.md
    recommended_skills:
      - "novel-writing-assistant"

  - id: reviewer
    description: "Editor/reviewer for quality assessment and refinement"
    system_prompt_file: prompts/reviewer-system.md
    recommended_skills:
      - "novel-writing-assistant"

states:
  - id: outline_chapter
    description: "Write chapter outline (uses chapter-outline.md template)"
    enter:
      - kind: capability
        name: creator.inject_prompt
        args:
          prompt_file: prompts/outline-chapter.md
          vars:
            work_ref: "{{preset.input.work_ref}}"
            work_id: "{{preset.input.work_id}}"
            topic: "{{preset.input.topic}}"
            vibe: "{{preset.input.vibe}}"
            chapter: "{{preset.input.chapter}}"
            chapter_label: "{{preset.input.chapter_label}}"
            outline_path: "{{preset.input.outline_path}}"
            slug: "{{preset.input.slug}}"
            world_kb_block: "{{preset.input.world_kb_block}}"
            open_findings_block: "{{preset.input.open_findings_block}}"
    exit_when:
      kind: manual
    next: draft_chapter

  - id: draft_chapter
    description: "Draft chapter body (uses chapter-body.md template; frontmatter status: draft)"
    enter:
      - kind: capability
        name: creator.inject_prompt
        args:
          prompt_file: prompts/draft-chapter.md
          vars:
            work_ref: "{{preset.input.work_ref}}"
            work_id: "{{preset.input.work_id}}"
            topic: "{{preset.input.topic}}"
            vibe: "{{preset.input.vibe}}"
            chapter: "{{preset.input.chapter}}"
            chapter_label: "{{preset.input.chapter_label}}"
            outline_path: "{{preset.input.outline_path}}"
            body_path: "{{preset.input.body_path}}"
            slug: "{{preset.input.slug}}"
            world_kb_block: "{{preset.input.world_kb_block}}"
            open_findings_block: "{{preset.input.open_findings_block}}"
      # Transition chapter status from outlined to draft
      - kind: capability
        name: novel.chapter_transition
        args:
          work_id: "{{preset.input.work_id}}"
          chapter: "{{preset.input.chapter}}"
          from_status: "outlined"
          to_status: "draft"
    exit_when:
      kind: manual
    next: finalize

  - id: finalize
    description: "Run llm_judge 五問 quality gate on the draft; NOGO returns WaitForInput (no state mutation in enter)"
    exit_when:
      kind: llm_judge
      template_file: prompts/finalize-exit.md
      judge_capability: judge.llm
      min_interval: "PT6H"
    next: finalize_commit

  - id: finalize_commit
    description: "Chapter 五問 gate passed; flip work_chapters row + frontmatter to finalized"
    enter:
      - kind: capability
        name: novel.chapter_transition
        args:
          work_id: "{{preset.input.work_id}}"
          chapter: "{{preset.input.chapter}}"
          from_status: "draft"
          to_status: "finalized"
    next: done

  - id: done
    terminal: true
