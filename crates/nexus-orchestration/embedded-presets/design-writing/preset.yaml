# Design-Writing Preset — Game-Bible Design Section Production (V1.55 P2; V1.56 P-last)
#
# LLM-driven per-section drafting + review loop for game-bible Design/*.md
# sections. Each run drafts one section (selected via preset input), then
# reviews it against the design 五问 rubric. On GO the section_status
# automatically transitions to "reviewed"; on explicit accept, transitions
# to "accepted". On NOGO, the author revises and re-runs.
#
# V1.56 P-last R-V155P2-F002 fix-wave: game_bible.section_status.update
# capability is invoked automatically after a review pass (GO) to
# transition the section from draft → reviewed. Authors can also trigger
# a reviewed → accepted transition by passing `accept: true` as a
# preset input variable, which the auto_update_status state handles.
#
# Input variables (passed via schedule/CLI input):
#   work_ref:       Work slug (directory under Works/)
#   section:        Target Design section filename (e.g. "overview.md")
#   section_title:  Human-readable section name (e.g. "Overview")
#   section_comment: HTML comment hint from the stub template
#   accept:          (optional) set to true to explicitly accept
#                     the section (reviewed → accepted)
#
# Stage chain:
#   draft_section → review_section → auto_update_status → done
#
# After review, auto_update_status invokes game_bible.section_status.update
# with new_status: "reviewed" (if review passed and not accepted) or
# "accepted" (if accept flag is set).

preset:
  id: design-writing
  version: 1
  kind: creator
  description: "LLM-driven per-section drafting + design 五问 review loop for game-bible Design sections (V1.56: section_status auto-transition on review pass)"
  requires_capabilities:
    - creator.inject_prompt
    - acp.prompt
    - judge.llm
    - game_bible.section_status.update
  run_intents:
    - work_continue
  initial: draft_section
  terminal: done
  # Preset gates — enforced at enqueue time.
  gates:
    - kind: work_field
      field: work_profile
      op: equals
      value: game_bible
    - kind: work_field
      field: work_ref
      op: required
    - kind: work_field
      field: intake_status
      op: equals
      value: complete
    - kind: filesystem
      path: "Works/{{work_ref}}/Design/"
      must_exist: true

states:
  - id: draft_section
    description: "Draft the selected Design section with an LLM-driven ACP prompt"
    enter:
      - kind: capability
        name: creator.inject_prompt
        args:
          prompt_file: prompts/design-section.md
          vars:
            work_ref: "{{preset.input.work_ref}}"
            section: "{{preset.input.section}}"
            section_title: "{{preset.input.section_title}}"
            section_comment: "{{preset.input.section_comment}}"
    exit_when:
      kind: llm_judge
      template_file: prompts/design-review-exit.md
      judge_capability: judge.llm
      min_interval: "PT1H"
    next: review_section

  - id: review_section
    description: "Design 五问 review: the LLM judge evaluates the drafted section against the design rubric"
    exit_when:
      kind: llm_judge
      template_file: prompts/design-review-exit.md
      judge_capability: judge.llm
    next: auto_update_status

  - id: auto_update_status
    description: "Auto-transition section_status after review: draft → reviewed"
    enter:
      - kind: capability
        name: game_bible.section_status.update
        args:
          work_ref: "{{preset.input.work_ref}}"
          section_path: "{{preset.input.section}}"
          new_status: "reviewed"
          reason: "auto-transition after design-writing review pass"
    exit_when:
      kind: manual
    next: done

  - id: done
    terminal: true
