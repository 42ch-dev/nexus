# Novel Manuscript Audit — Extract Mode (V1.44 P0 fix, DF-69)
#
# On-demand World KB extraction: read chapter body → synchronous
# kb.extract_work (no queue ceremony). World-bound only.
# Does NOT enter the FL-E auto-chain driver.
#
# Input variables (passed via schedule input):
#   work_id:           Work entity ID (wrk_...).
#   work_ref:          Human-readable short reference (directory name).
#   chapter:           Integer chapter number (required).
#   volume:            Volume number (default 1; required for multi-volume).
#   body_path:         Override path; default resolved from work_chapters.
#   world_id:          Bound World ID (required — preset gate enforces this).
#   creator_id:        Creator ID for kb.extract_work capability.
#
# State machine: load_chapter → extract_sync → done
#
# Launch:
#   nexus42 creator run audit-chapter <work_id> --mode extract [--chapter N]
#
# Precondition: Work must be World-bound (world_id non-null).
#   Worldless Works receive 422 world_required_for_extract.

preset:
  id: novel-manuscript-audit-extract
  version: 1
  kind: creator
  description: "On-demand chapter KB extract: synchronous kb.extract_work for World-bound Works (no FL-E auto-chain, no queue ceremony)"
  requires_capabilities:
    - creator.inject_prompt
    - acp.prompt
    - kb.extract_work
  run_intents:
    - work_continue
  initial: load_chapter
  terminal: done
  world_binding:
    mode: required  # R-V144P0-002: enforce World-bound at preset gate level
  gates:
    - kind: work_field
      field: work_profile
      op: equals
      value: novel
    - kind: work_field
      field: work_ref
      op: required
  # V1.45 §3.3: CLI args parsed by the generic `creator run` runner.
  cli_args:
    - name: chapter
      type: integer
      required: true
      description: "Chapter number to extract"
    - name: volume
      type: integer
      required: false
      default: 1
      description: "Volume number (default 1)"

states:
  - id: load_chapter
    description: "Load chapter body from resolved path for KB extraction"
    enter:
      - kind: capability
        name: creator.inject_prompt
        args:
          prompt_file: prompts/load-chapter.md
          vars:
            work_ref: "{{preset.input.work_ref}}"
            work_id: "{{preset.input.work_id}}"
            chapter: "{{preset.input.chapter}}"
            volume: "{{preset.input.volume}}"
            body_path: "{{preset.input.body_path}}"
    exit_when:
      kind: manual
    next: extract_sync

  - id: extract_sync
    description: "Extract mode: synchronous kb.extract_work for World-bound Works (no queue ceremony)"
    enter:
      - kind: capability
        name: kb.extract_work
        args:
          creator_id: "{{preset.input.creator_id}}"
          work_id: "{{preset.input.work_id}}"
          world_id: "{{preset.input.world_id}}"
          profile_hint: "novel"
          source_kind: "work_chapter"
          source_locator: "{{preset.input.body_path}}"
    exit_when:
      kind: rule
    next: done

  - id: done
    terminal: true
