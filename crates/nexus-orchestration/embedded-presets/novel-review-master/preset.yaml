# Novel Review Master Preset — Human-in-Loop Quality Decisions (V1.39 P2)
#
# Surfaces open findings (target_executor: master) and any applicable rules
# for human master decision. The user reviews each finding and chooses:
# approve (→ resolved), reject (→ wont_fix), or defer.
#
# V1.40 P3 (T8): Added sync_world_kb state after decisions. When the Work
# is World-bound (preset.input.world_id is set), this state invokes
# kb.extract_work directly via a capability enter action. The capability
# itself returns a no-op skip when world_id is empty/absent, so legacy V1.39
# worldless Works pass through cleanly to done.
#
# V1.51 T-A P0: review-time KB extraction now uses the `nexus.llm.extract`
# capability (sibling to `judge.llm`) instead of the V1.50 capitalized-noun
# heuristic. The extraction is invoked by the schedule-supervisor terminal
# hook `quality_loop::extract_kb_candidates_for_review` (keyed on this
# preset's id), which threads the daemon's CapabilityRegistry so the LLM
# pathway runs when a worker is available; the heuristic remains the
# no-worker fallback. Extracted candidates carry an LLM-judged block_type,
# confidence, and a verbatim source_quote, surfaced on `creator world kb
# adopt`. Closes R-V150KBED-01. See `knowledge/specs/llm-extract.md` §5.
#
# NOTE: The original plan (T8) described a `schedule.enqueue_child` approach
# with parent dependency, but the shipped design uses direct capability
# invocation from the preset state machine instead. `build_child_kb_extract_schedule`
# was removed as dead code per QC1/2 W-001 / W-007.
#
# This preset is interactive — it presents findings to the user and waits
# for manual input. It does NOT auto-advance.
#
# Input variables (passed via core_context when starting a schedule):
#   work_id:        Work entity ID (wrk_...).
#   work_ref:       Human-readable short reference used as directory name.
#   topic:          Novel topic or description.
#   open_findings:  Serialized list of open findings (JSON) with target_executor=master.
#   world_id:       (V1.40) Bound World ID. When present, enables kb-extract child.
#   body_path:      (V1.40) Chapter body path for kb-extract artifact locator.
#
# State machine: present → await_decision → sync_world_kb → done
#   - present:        Display all open findings requiring master review with context.
#   - await_decision: Wait for human to review and decide on each finding.
#   - sync_world_kb:  (V1.40 P3) Enqueue child kb-extract if World-bound.
#   - done:           Terminal; decisions written back via P1 findings API.
#                     (V1.51 T-A P0) Supervisor terminal hook then runs
#                     nexus.llm.extract review-time KB candidate extraction.
#
# Launch:
#   nexus42 creator run stage advance <work_id> --stage review
#   (with preset routed from findings where target_executor=master)
#
# Alternatively via daemon schedule:
#   nexus42 daemon schedule add --preset novel-review-master \
#     --creator <creator-id> --seed '{"work_id":"...","work_ref":"..."}'

preset:
  id: novel-review-master
  version: 3  # V1.51 T-A P0: review-time extraction swapped heuristic → nexus.llm.extract
  kind: creator
  description: "Surface open findings for human master review; interactive approval/reject/wont_fix decisions; V1.40 syncs World KB after review; V1.51 review-time extraction uses nexus.llm.extract"
  requires_capabilities:
    - creator.inject_prompt
    - acp.prompt
    - nexus.llm.extract  # V1.51 T-A P0: review-time KB candidate extraction (supervisor terminal hook)
  run_intents:
    - work_continue
  initial: present
  terminal: done
  world_binding:
    mode: optional
  # Preset gates — enforced at enqueue time.
  gates:
    - kind: work_field
      field: work_profile
      op: equals
      value: novel
    - kind: work_field
      field: work_ref
      op: required
  # V1.45 §3.3: CLI args parsed by the generic `creator run` runner.
  cli_args:
    - name: finding-id
      type: string
      required: false
      description: "Filter to a specific finding ID for targeted review"
    - name: auto-schedule
      type: boolean
      required: false
      default: false
      description: "Skip interactive confirmation and auto-schedule immediately"

states:
  - id: present
    description: "Present all open findings requiring master review, organized by severity"
    enter:
      - kind: capability
        name: creator.inject_prompt
        args:
          prompt_file: prompts/present-findings.md
          vars:
            work_ref: "{{preset.input.work_ref}}"
            work_id: "{{preset.input.work_id}}"
            topic: "{{preset.input.topic}}"
            open_findings: "{{preset.input.open_findings}}"
    exit_when:
      kind: manual
    next: await_decision

  - id: await_decision
    description: "Wait for human master to review findings and record decisions (approve/reject/wont_fix)"
    enter:
      - kind: capability
        name: creator.inject_prompt
        args:
          prompt_file: prompts/await-decision.md
          vars:
            work_ref: "{{preset.input.work_ref}}"
            work_id: "{{preset.input.work_id}}"
            open_findings: "{{preset.input.open_findings}}"
    exit_when:
      kind: manual
    next: sync_world_kb

  - id: sync_world_kb
    description: "V1.40 P3: invoke kb.extract_work for World-bound Works. Returns skip no-op for worldless (empty world_id)."
    enter:
      - kind: capability
        name: kb.extract_work
        args:
          creator_id: "{{preset.input.creator_id}}"
          work_id: "{{preset.input.work_id}}"
          world_id: "{{preset.input.world_id}}"
          profile_hint: "novel"
          source_kind: "work_chapter"
          source_locator: "{{preset.input.body_path}}"
    exit_when:
      kind: rule
    next: done

  - id: done
    terminal: true
