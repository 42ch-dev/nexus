# Novel Review Master Preset — Human-in-Loop Quality Decisions (V1.39 P2)
#
# Surfaces open findings (target_executor: master) and any applicable rules
# for human master decision. The user reviews each finding and chooses:
# approve (→ resolved), reject (→ wont_fix), or defer.
#
# This preset is interactive — it presents findings to the user and waits
# for manual input. It does NOT auto-advance.
#
# Input variables (passed via core_context when starting a schedule):
#   work_id:        Work entity ID (wrk_...).
#   work_ref:       Human-readable short reference used as directory name.
#   topic:          Novel topic or description.
#   open_findings:  Serialized list of open findings (JSON) with target_executor=master.
#
# State machine: present → await_decision → done
#   - present:        Display all open findings requiring master review with context.
#   - await_decision: Wait for human to review and decide on each finding.
#   - done:           Terminal; decisions written back via P1 findings API.
#
# Launch:
#   nexus42 creator run stage advance <work_id> --stage review
#   (with preset routed from findings where target_executor=master)
#
# Alternatively via daemon schedule:
#   nexus42 daemon schedule add --preset novel-review-master \
#     --creator <creator-id> --seed '{"work_id":"...","work_ref":"..."}'

preset:
  id: novel-review-master
  version: 1
  kind: creator
  description: "Surface open findings for human master review; interactive approval/reject/wont_fix decisions"
  requires_capabilities:
    - creator.inject_prompt
    - acp.prompt
  run_intents:
    - work_continue
  initial: present
  terminal: done
  world_binding:
    mode: optional
  # Preset gates — enforced at enqueue time.
  gates:
    - kind: work_field
      field: work_profile
      op: equals
      value: novel
    - kind: work_field
      field: work_ref
      op: required

states:
  - id: present
    description: "Present all open findings requiring master review, organized by severity"
    enter:
      - kind: capability
        name: creator.inject_prompt
        args:
          prompt_file: prompts/present-findings.md
          vars:
            work_ref: "{{preset.input.work_ref}}"
            work_id: "{{preset.input.work_id}}"
            topic: "{{preset.input.topic}}"
            open_findings: "{{preset.input.open_findings}}"
    exit_when:
      kind: manual
    next: await_decision

  - id: await_decision
    description: "Wait for human master to review findings and record decisions (approve/reject/wont_fix)"
    enter:
      - kind: capability
        name: creator.inject_prompt
        args:
          prompt_file: prompts/await-decision.md
          vars:
            work_ref: "{{preset.input.work_ref}}"
            work_id: "{{preset.input.work_id}}"
            open_findings: "{{preset.input.open_findings}}"
    exit_when:
      kind: manual
    next: done

  - id: done
    terminal: true
