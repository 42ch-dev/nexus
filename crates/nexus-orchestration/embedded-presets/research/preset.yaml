# Research Preset — Output Contract
#
# This preset produces research artifacts at the following locations:
# - Primary report: {$workspace_dir}/.nexus42/references/{$run_id}/report.md
# - Supporting artifacts: {$workspace_dir}/.nexus42/references/{$run_id}/artifacts/
#
# {$run_id} is derived from the session ID or a timestamp-based identifier.
# The output structure is created by the preset workflow, not by CLI commands.
#
# R-V139P5-W-3: run_intents are set per-state below. When adding new states,
# check that run_intent matches the intended daemon behavior (the daemon reads
# this to decide context assembly strategy).
#
# R-V139P5-W-5 (deferred): structured research status hint. Currently the
# research preset reports progress through session log events only. A future
# slice may add structured intermediate status (e.g., "scanning references",
# "extracting content", "generating report") surfaced via the Works status API.
#
# R-V139P5-S3 (deferred): i18n hint structure. The description and prompt
# fields use English prose. A future i18n pass may externalize these strings.
#
# R-V139P5-W-4: preset versioning policy — the `version` field below must be
# bumped on any breaking change to the state machine (adding/removing states,
# changing transition edges, modifying prompt templates that alter output
# contract). Non-breaking additions (new optional fields, comment changes)
# may keep the same version. The version is stored in creator_schedules at
# enqueue time and used by the loader to select compatible templates.

preset:
  id: research
  version: 2
  kind: creator
  description: "A research workflow: scan references, extract content, and produce structured reports"
  requires_capabilities:
    - creator.inject_prompt
    - acp.prompt
    - judge.llm
  run_intents:
    - knowledge_ingest
    - work_continue
  initial: scanning
  terminal: done
  # Preset gates — enforced at enqueue time.
  # Research requires intake to be complete (brief must exist for meaningful research).
  # work_ref is required for the preset to know where to write artifacts.
  gates:
    - kind: work_field
      field: intake_status
      op: equals
      value: complete
    - kind: work_field
      field: work_ref
      op: required

# Roles for the research workflow
roles:
  - id: researcher
    description: "Primary researcher for scanning and extracting reference materials"
    system_prompt_file: prompts/researcher-system.md
    recommended_skills:
      - "novel-writing-assistant"

  - id: analyst
    description: "Data analyst for structuring and summarizing extracted content"
    system_prompt_file: prompts/analyst-system.md
    recommended_skills:
      - "novel-writing-assistant"

states:
  - id: scanning
    description: "Scan workspace References/ directory for reference sources"
    enter:
      - kind: capability
        name: creator.inject_prompt
        args:
          prompt_file: prompts/scanning.md
          vars:
            references_dir: "{{preset.input.references_dir}}"
    exit_when:
      kind: llm_judge
      template_file: prompts/scanning-exit.md
      judge_capability: judge.llm
      min_interval: "PT1H"
    next: extracting

  - id: extracting
    description: "Extract content from discovered reference sources"
    enter:
      - kind: inner_graph
        name: extraction_graph
    exit_when:
      kind: graph_complete
    next: synthesizing

  - id: synthesizing
    description: "Synthesize extracted content into a structured research report"
    enter:
      - kind: capability
        name: creator.inject_prompt
        args:
          prompt_file: prompts/synthesizing.md
          vars:
            output_dir: "{{preset.input.output_dir}}"
    # Fix W-1: changed from `kind: manual` to `kind: llm_judge` so auto-chain
    # progresses autonomously. Manual exit stalls auto-chain at research → produce.
    exit_when:
      kind: llm_judge
      template_file: prompts/synthesizing-exit.md
      judge_capability: judge.llm
    next: done
    context_update:
      op:
        kind: append
      template_file: prompts/synthesizing-ctx-update.md

  - id: done
    terminal: true

inner_graphs:
  extraction_graph:
    nodes:
      - id: extract_text
        kind: acp_prompt
        agent: researcher
        template_file: prompts/extract-text.md
        tool_policy: auto_grant_read_only
      - id: extract_metadata
        kind: acp_prompt
        agent: researcher
        depends_on: [extract_text]
        template_file: prompts/extract-metadata.md
        tool_policy: auto_grant_read_only
      - id: validate
        kind: acp_prompt
        agent: analyst
        depends_on: [extract_metadata]
        template_file: prompts/validate-extraction.md
    output_binding: validate.text
