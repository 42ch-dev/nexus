# KB Extract Preset — Work-to-World Knowledge Extraction
#
# This preset processes queued KB extract jobs:
# 1. Claims the next queued job for the active creator (or uses a specific job_id)
# 2. Reads the work-scope KB file content
# 3. Sends an extraction prompt via acp.prompt
# 4. Parses the structured JSON response
# 5. Inserts a KeyBlock into the target world
#
# The kb.extract_work capability handles the full lifecycle:
# claim → mark_running → build prompt → parse LLM response → insert KeyBlock → mark done/failed
#
# Manual run command:
#   nexus42 daemon schedule add --preset kb-extract --creator <creator-id>

preset:
  id: kb-extract
  version: 3  # Bumped for inner graph wiring fix
  kind: creator
  description: "Extract structured KeyBlocks from work-scope KB entries into world knowledge"
  requires_capabilities:
    - kb.extract_work
    - acp.prompt
  run_intents:
    - knowledge_ingest
  initial: loading
  terminal: done

states:
  - id: loading
    description: "Load and claim the next queued extract job"
    enter:
      - kind: capability
        name: kb.extract_work
        args:
          creator_id: "{{preset.input.creator_id}}"
          job_id: "{{preset.input.job_id}}"
          work_content: "{{preset.input.work_content}}"
    exit_when:
      kind: rule
    next: extracting

  - id: extracting
    description: "Run extraction prompt via inner graph, then finalize with kb.extract_work"
    enter:
      - kind: inner_graph
        name: extraction_graph
      - kind: capability
        name: kb.extract_work
        args:
          creator_id: "{{preset.input.creator_id}}"
          job_id: "{{loading.output.job_id}}"
          work_content: "{{preset.input.work_content}}"
          llm_response: "{{extraction_graph.output}}"
    exit_when:
      kind: graph_complete
    next: done

  - id: done
    terminal: true

inner_graphs:
  extraction_graph:
    nodes:
      - id: extract
        kind: acp_prompt
        template_file: prompts/extract.md
        tool_policy: auto_grant_read_only
    output_binding: extract.text
