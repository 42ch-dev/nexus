[package]
name = "nexus-orchestration"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Orchestration engine (graph-flow adapter + capability registry + worker manager)."

[dependencies]
graph-flow = "=0.2.3"                                    # rig feature NOT enabled (per best-practices §1.2 pin policy)
async-trait = { workspace = true }
tokio = { workspace = true }
# sqlx: workspace dep is declared + feature-gated by WS8 T1 (runtime-tokio, sqlite, macros, migrate, chrono, uuid).
# This crate re-uses the workspace dep; do not add local features.
sqlx = { workspace = true }
# jsonrpsee: deferred to WS2 Batch ③ (T5) when actually needed.
# See crate-selection-best-practices-v1.md §3.1 for the canonical feature list.
tokio-util = { version = "0.7", features = ["codec"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
nexus-contracts = { path = "../nexus-contracts" }
nexus-local-db = { path = "../nexus-local-db" }
nexus-domain = { path = "../nexus-domain" }

[dev-dependencies]
tempfile = { workspace = true }
