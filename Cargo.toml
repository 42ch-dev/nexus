[workspace]
members = [
    "crates/nexus-contracts",
    "crates/nexus-domain",
    # Future members (commented out for now):
    # "crates/nexus42",
    # "crates/nexus42d",
    # "crates/nexus-sync",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["42ch"]
license = "MIT"
repository = "https://github.com/42ch/nexus"

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
tokio = { version = "1.35", features = ["full"] }
